name: ✨ Feature Request
description: 提出一个功能需求或建议
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
  - type: textarea
    id: related-problem
    attributes:
      label: 该功能需求是否与某个问题相关？请描述
      description: 清晰简洁地描述问题是什么。例如：我总是在…… 时感到困扰。
      placeholder: 例如：我总是在使用 XX 功能时感到不便...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 描述你期望的解决方案
      description: 清晰简洁地说明你希望实现的效果。
      placeholder: 请描述你希望新增或改进的功能...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 描述你考虑过的其他方案
      description: 清晰简洁地描述你考虑过的其他替代方案或功能。
      placeholder: 可选
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 补充说明
      description: 在此添加与该功能需求相关的其他背景信息或截图。
      placeholder: 可选
    validations:
      required: false
